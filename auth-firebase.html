<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnHub Login</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0f0a, #071307);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    margin: 0;
    color: white;
}

.container {
    background: #0e1a10;
    padding: 25px;
    border-radius: 12px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 0 20px rgba(0,255,120,0.2);
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid rgba(76, 255, 154, 0.15);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #4cff9a;
}

input {
    width: 100%;
    padding: 10px;
    margin: 7px 0;
    border-radius: 6px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 10px;
    background: #19a34d;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 15px;
    font-weight: 600;
}

button:hover {
    background: #15803d;
}

.switch {
    margin-top: 14px;
    text-align: center;
    cursor: pointer;
    color: #4cff9a;
    font-size: 14px;
}

.switch:hover {
    text-decoration: underline;
}

.small-text {
    margin-top: 10px;
    text-align: center;
    font-size: 12px;
    color: #b7d9c0;
}

@media (max-width: 480px) {
    .container {
        padding: 20px;
        max-width: 100%;
    }

    h2 {
        font-size: 22px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2 id="formTitle">Login</h2>

    <form onsubmit="handleAuth(event)">
        <input id="name" type="text" placeholder="Full Name" style="display:none">
        <input id="email" type="email" placeholder="Email" required>
        <input id="password" type="password" placeholder="Password" required>
        <button type="submit" id="submitBtn">Login</button>
    </form>

    <div class="switch" id="switchText" onclick="toggleMode()">
        Don't have an account? Create one
    </div>

    <div class="small-text">Firebase Connected</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAnM53oo0Jah3Zg1Wxda-K6N5ddtYuJfQI",
    authDomain: "learnhub-4e07c.firebaseapp.com",
    databaseURL: "https://learnhub-4e07c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "learnhub-4e07c",
    storageBucket: "learnhub-4e07c.firebasestorage.app",
    messagingSenderId: "561780501823",
    appId: "1:561780501823:web:b064c375c17ca618ee378a"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

let isLogin = true;

function toggleMode() {
    isLogin = !isLogin;

    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Signup";
    document.getElementById("name").style.display = isLogin ? "none" : "block";
    document.getElementById("submitBtn").innerText = isLogin ? "Login" : "Create Account";
    document.getElementById("switchText").innerText = isLogin
        ? "Don't have an account? Create one"
        : "Already have an account? Login";
}

function handleAuth(e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const name = document.getElementById("name").value.trim();

    if (isLogin) {
        auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                window.location.href = "dashboard-firebase.html";
            })
            .catch(err => {
                alert(err.message);
            });
    } else {
        if (!name) {
            alert("Please enter your full name");
            return;
        }

        auth.createUserWithEmailAndPassword(email, password)
            .then((cred) => {
                return db.ref("users/" + cred.user.uid).set({
                    name: name,
                    email: email,
                    enrolledCourses: [],
                    progress: {},
                    quizScores: {}
                });
            })
            .then(() => {
                window.location.href = "dashboard-firebase.html";
            })
            .catch(err => {
                alert(err.message);
            });
    }
}
</script>

</body>
</html>
