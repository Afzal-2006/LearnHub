<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub - Login & Signup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        .container { width: 100%; max-width: 400px; }
        .form-box { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #667eea; font-size: 2rem; margin-bottom: 0.5rem; }
        .logo p { color: #999; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 600; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.75rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn { width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .form-toggle { text-align: center; margin-top: 1.5rem; color: #666; font-size: 0.9rem; }
        .form-toggle a { color: #667eea; text-decoration: none; font-weight: 600; cursor: pointer; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .error-message { background: #fee; color: #c33; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 0.9rem; }
        .success-message { background: #efe; color: #3c3; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 0.9rem; }
        .loading { display: none; text-align: center; color: #667eea; font-weight: 600; }
        .firebase-status { text-align: center; font-size: 0.8rem; color: #999; margin-top: 1rem; }
        .firebase-status.connected { color: #3c3; }
        .firebase-status.error { color: #c33; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-box">
            <div class="logo">
                <h1>🎓ABCD</h1>
                <p>Learn to Code, Build Your Future</p>
            </div>

            <div id="loginForm" class="form-section active">
                <h2>Login</h2>
                <div class="loading" id="loginLoading">Signing in...</div>
                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn" id="loginBtn">Login</button>
                </form>
                <div class="form-toggle">Don't have an account? <a onclick="toggleForm()">Sign Up</a></div>
            </div>

            <div id="signupForm" class="form-section">
                <h2>Create Account</h2>
                <div class="loading" id="signupLoading">Creating account...</div>
                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signupConfirm" required>
                    </div>
                    <button type="submit" class="btn" id="signupBtn">Create Account</button>
                </form>
                <div class="form-toggle">Already have an account? <a onclick="toggleForm()">Login</a></div>
            </div>

            <div class="firebase-status" id="firebaseStatus">🔄 Connecting to Firebase...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <script>
        // FIXED CONFIG BLOCK
        const firebaseConfig = {
            apiKey: "AIzaSyAnM53oo0Jah3Zg1Wxda-K6N5ddtYuJfQI",
            authDomain: "learnhub-4e07c.firebaseapp.com",
            databaseURL: "https://learnhub-4e07c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "learnhub-4e07c",
            storageBucket: "learnhub-4e07c.firebasestorage.app",
            messagingSenderId: "561780501823",
            appId: "1:561780501823:web:b064c375c17ca618ee378a",
            measurementId: "G-XSW93XZBZ8"
        };

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase initialized');
            document.getElementById('firebaseStatus').textContent = '✅ Firebase Connected';
            document.getElementById('firebaseStatus').className = 'firebase-status connected';
        } catch (error) {
            console.error('❌ Error:', error);
            document.getElementById('firebaseStatus').textContent = '❌ Connection Error';
        }

        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('active');
            document.getElementById('signupForm').classList.toggle('active');
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => window.location.href = 'dashboard-firebase.html')
                .catch(err => {
                    document.getElementById('loginError').style.display = 'block';
                    document.getElementById('loginError').textContent = err.message;
                });
        }

        function handleSignup(event) {
            event.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const name = document.getElementById('signupName').value;

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return firebase.database().ref('users/' + userCredential.user.uid).set({
                        name: name,
                        email: email,
                        createdAt: new Date().toISOString()
                    });
                })
                .then(() => window.location.href = 'dashboard-firebase.html')
                .catch(err => {
                    document.getElementById('signupError').style.display = 'block';
                    document.getElementById('signupError').textContent = err.message;
                });
        }
    </script>
</body>
</html>
