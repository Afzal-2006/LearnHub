        const courses = [
            { id: 1, name: 'Web Development', description: 'Learn HTML, CSS, JavaScript', level: 'Beginner', lessons: 24, color: 'color1', url: 'course.html' },
            { id: 2, name: 'Java Basics', description: 'Master Java fundamentals', level: 'Beginner', lessons: 28, color: 'color2', url: 'java-course.html' },

                currentUser = user;
                document.getElementById('userName').textContent = user.displayName || user.email;

                database.ref('users/' + user.uid).on('value', (snapshot) => {
                    const userData = snapshot.val() || {};
                    renderAllCourses(userData.enrolledCourses || []);
                    renderMyCourses(userData.enrolledCourses || []);
                });
            });

        function renderAllCourses(enrolledCourses) {
            const container = document.getElementById('allCoursesGrid');
            container.innerHTML = courses.map(course => `

                    <div class="course-body">

                    </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill-${course.id}" style="width: 0%;"></div>

            <button class="course-button" onclick="window.location.href='${course.url}'">Continue Learning</button>
        </div>
    `).join('') + `</div>`;

    // CRITICAL: Set up listeners for each enrolled course
    enrolledCourseIds.forEach(id => {
        database.ref('users/' + currentUser.uid + '/progress/' + id).on('value', (snapshot) => {
            const progressVal = snapshot.val() || 0;
            const fill = document.getElementById('progress-fill-' + id);
            const text = document.getElementById('percent-text-' + id);
            
            if (fill) fill.style.width = progressVal + '%';
            if (text) text.textContent = progressVal;
        });
    });
}

        function handleEnrollment(courseId, courseName, courseUrl) {
            const userRef = database.ref('users/' + currentUser.uid);
            userRef.once('value', snap => {
                const data = snap.val() || {};
                const list = data.enrolledCourses || [];
                if (!list.includes(courseId)) {
                    list.push(courseId);
                    userRef.update({ enrolledCourses: list });
                    database.ref('users/' + currentUser.uid + '/progress/' + courseId).set(0);
                    alert(`Enrolled in ${courseName}!`);
                } else {
                    window.location.href = courseUrl;
                }
            });
        }

            event.target.classList.add('active');
        }

        }

            background: linear-gradient(135deg, #145c2b, #22c55e);
        }

        .enrolled-list {
            display: grid;
            gap: 1.2rem;
        }

        .enrolled-item {
            background: rgba(8, 20, 8, 0.96);
            border-radius: 14px;
            padding: 1.4rem;
            border: 1px solid #1eff7a24;
            box-shadow: 0 0 15px rgba(30, 255, 122, 0.05);
        }

        .enrolled-item h3 {
            color: #95ffba;
            margin-bottom: 0.7rem;
        }

        .progress-bar {
            background: #0b140c;
            border-radius: 8px;
            height: 10px;
            margin: 0.8rem 0;
            overflow: hidden;
            border: 1px solid #1eff7a15;
        }

        .progress-fill {
            background: linear-gradient(90deg, #19a34d, #66ffad);
            height: 100%;
            width: 0%;
            transition: width 0.35s ease;
            box-shadow: 0 0 10px rgba(102, 255, 173, 0.25);
        }

        .progress-text {
            color: #d5ffe1;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .quiz-score {
            margin-bottom: 1rem;
            color: #b7f7c8;
            background: #0d170e;
            border: 1px solid #1eff7a18;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .empty-message {
            background: rgba(8, 20, 8, 0.96);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            color: #c4ead0;
            border: 1px solid #1eff7a22;
        }

        .loading {
            color: #b8e8c5;
            padding: 1rem;
        }

        .color1 { background: linear-gradient(135deg, #0f5132 0%, #198754 100%); }
        .color2 { background: linear-gradient(135deg, #14532d 0%, #22c55e 100%); }
        .color3 { background: linear-gradient(135deg, #064e3b 0%, #10b981 100%); }
        .color4 { background: linear-gradient(135deg, #14532d 0%, #16a34a 100%); }
        .color5 { background: linear-gradient(135deg, #166534 0%, #4ade80 100%); }
        .color6 { background: linear-gradient(135deg, #052e16 0%, #15803d 100%); }
        .color7 { background: linear-gradient(135deg, #14532d 0%, #22c55e 100%); }
        .color8 { background: linear-gradient(135deg, #064e3b 0%, #34d399 100%); }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .user-info {
                flex-direction: column;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🎓 LearnHub</h1>
        <div class="user-info">
            <span id="userName">User</span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h2>Welcome to LearnHub!</h2>
            <p>Track your learning progress, continue your enrolled courses, and view your quiz performance.</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('all-courses', this)">All Courses</button>
            <button class="tab-btn" onclick="switchTab('my-courses', this)">My Courses</button>
        </div>

        <div id="all-courses" class="tab-content active">
            <div id="allCoursesGrid" class="courses-grid">
                <div class="loading">Loading courses...</div>
            </div>
        </div>

        <div id="my-courses" class="tab-content">
            <div id="myCoursesContainer"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnM53oo0Jah3Zg1Wxda-K6N5ddtYuJfQI",
            authDomain: "learnhub-4e07c.firebaseapp.com",
            databaseURL: "https://learnhub-4e07c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "learnhub-4e07c",
            storageBucket: "learnhub-4e07c.firebasestorage.app",
            messagingSenderId: "561780501823",
            appId: "1:561780501823:web:b064c375c17ca618ee378a",
            measurementId: "G-XSW93XZBZ8"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const database = firebase.database();

        const courses = [
            { id: 1, name: 'Web Development', description: 'Learn HTML, CSS, JavaScript', level: 'Beginner', lessons: 24, color: 'color1', url: 'course.html' },
            { id: 2, name: 'Java Basics', description: 'Master Java fundamentals', level: 'Beginner', lessons: 28, color: 'color2', url: 'java-course.html' },
            { id: 3, name: 'Python Masterclass', description: 'Learn Python for automation and more', level: 'Intermediate', lessons: 32, color: 'color3', url: 'python-course.html' },
            { id: 4, name: 'C Programming', description: 'Understand low-level programming', level: 'Intermediate', lessons: 26, color: 'color4', url: 'c-course.html' },
            { id: 5, name: 'C++ Advanced', description: 'Master OOP with C++', level: 'Advanced', lessons: 30, color: 'color5', url: 'cpp-course.html' },
            { id: 6, name: 'JavaScript Pro', description: 'Advanced JS patterns and browser logic', level: 'Advanced', lessons: 25, color: 'color6', url: 'javascript-course.html' },
            { id: 7, name: 'Data Structures', description: 'Essential DSA concepts', level: 'Advanced', lessons: 29, color: 'color7', url: 'dsa-course.html' },
            { id: 8, name: 'React Framework', description: 'Build modern component-based UIs', level: 'Intermediate', lessons: 27, color: 'color8', url: 'react-course.html' }
        ];

        let currentUser = null;

        function loadUserData() {
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'auth-firebase.html';
                    return;
                }

                currentUser = user;
                document.getElementById('userName').textContent = user.displayName || user.email;

                database.ref('users/' + user.uid).on('value', (snapshot) => {
                    const userData = snapshot.val() || {};
                    const enrolledCourses = userData.enrolledCourses || [];
                    renderAllCourses(enrolledCourses);
                    renderMyCourses(enrolledCourses);
                });
            });
        }

        function renderAllCourses(enrolledCourses) {
            const container = document.getElementById('allCoursesGrid');

            container.innerHTML = courses.map(course => `
                <div class="course-card">
                    <div class="course-header ${course.color}">${course.name}</div>
                    <div class="course-body">
                        <p class="course-description">${course.description}</p>
                        <div class="course-meta">
                            <span>📚 ${course.lessons} Lessons</span>
                            <span>📊 ${course.level}</span>
                        </div>
                        <button class="course-button ${enrolledCourses.includes(course.id) ? 'enrolled' : ''}" 
                                onclick="handleEnrollment(${course.id}, '${course.name.replace(/'/g, "\\'")}', '${course.url}')">
                            ${enrolledCourses.includes(course.id) ? '✓ Enrolled / Open' : 'Enroll Now'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderMyCourses(enrolledCourseIds) {
            const container = document.getElementById('myCoursesContainer');
            const enrolledCourses = courses.filter(c => enrolledCourseIds.includes(c.id));

            if (enrolledCourses.length === 0) {
                container.innerHTML = `<div class="empty-message"><p>No enrolled courses yet.</p></div>`;
                return;
            }

            container.innerHTML = `
                <div class="enrolled-list">
                    ${enrolledCourses.map(course => `
                        <div class="enrolled-item">
                            <h3>${course.name}</h3>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progress-fill-${course.id}" style="width: 0%;"></div>
                            </div>
                            <p class="progress-text"><span id="percent-text-${course.id}">0</span>% Complete</p>

                            <div class="quiz-score" id="quiz-score-${course.id}">
                                Quiz Score: Not attempted yet
                            </div>

                            <button class="course-button" onclick="window.location.href='${course.url}'">Continue Learning</button>
                        </div>
                    `).join('')}
                </div>
            `;

            enrolledCourseIds.forEach(id => {
                database.ref('users/' + currentUser.uid + '/progress/' + id).on('value', (snapshot) => {
                    const progressVal = snapshot.val() || 0;
                    const fill = document.getElementById('progress-fill-' + id);
                    const text = document.getElementById('percent-text-' + id);

                    if (fill) fill.style.width = progressVal + '%';
                    if (text) text.textContent = progressVal;
                });

                database.ref('users/' + currentUser.uid + '/quizScores/' + id).on('value', (snapshot) => {
                    const quizData = snapshot.val();
                    const quizBox = document.getElementById('quiz-score-' + id);

                    if (!quizBox) return;

                    if (quizData) {
                        quizBox.textContent = `Quiz Score: ${quizData.score}/${quizData.total} (${quizData.percent}%)`;
                    } else {
                        quizBox.textContent = 'Quiz Score: Not attempted yet';
                    }
                });
            });
        }

        function handleEnrollment(courseId, courseName, courseUrl) {
            const userRef = database.ref('users/' + currentUser.uid);

            userRef.once('value', snap => {
                const data = snap.val() || {};
                const list = data.enrolledCourses || [];

                if (!list.includes(courseId)) {
                    list.push(courseId);

                    userRef.update({ enrolledCourses: list });
                    database.ref('users/' + currentUser.uid + '/progress/' + courseId).set(0);

                    alert(`Enrolled in ${courseName}!`);
                } else {
                    window.location.href = courseUrl;
                }
            });
        }

        function switchTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(name).classList.add('active');
            if (btn) btn.classList.add('active');
        }

        function logout() {
            if (confirm('Logout?')) {
                auth.signOut().then(() => {
                    window.location.href = 'auth-firebase.html';
                });
            }
        }

        window.addEventListener('load', loadUserData);
    </script>
</body>
</html>
