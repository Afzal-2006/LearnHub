<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub - Dashboard (Firebase)</title>
    <style>
        /* [KEEPING ALL YOUR ORIGINAL STYLES EXACTLY AS THEY WERE] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 1rem; }
        .navbar { background: white; padding: 1rem 2rem; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); margin-bottom: 2rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { color: #667eea; font-size: 1.5rem; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-info span { color: #666; font-weight: 600; }
        .btn-logout { background: #ff6b6b; color: white; padding: 0.5rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; background: white; padding: 1rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        .tab-btn { padding: 0.75rem 1.5rem; background: #f0f0f0; border: 2px solid transparent; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .course-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); transition: all 0.3s; }
        .course-header { padding: 1.5rem; color: white; font-weight: 700; font-size: 1.2rem; text-align: center; }
        .course-body { padding: 1.5rem; }
        .course-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 0.75rem; background: #f9f9f9; border-radius: 8px; }
        .course-button { width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .course-button.enrolled { background: #28a745; }
        .progress-bar { background: #eee; border-radius: 8px; height: 8px; margin: 1rem 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 0%; transition: width 0.3s; }
        .color1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .color2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .color3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .color4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .color5 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .color6 { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
        .color7 { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .color8 { background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%); }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🎓 LearnHub</h1>
        <div class="user-info">
            <span id="userName">User</span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h2>Welcome to LearnHub!</h2>
            <p>Choose from our wide range of programming courses and start learning today.</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('all-courses')">All Courses</button>
            <button class="tab-btn" onclick="switchTab('my-courses')">My Courses</button>
        </div>

        <div id="all-courses" class="tab-content active">
            <div id="allCoursesGrid" class="courses-grid">
                <div class="loading">Loading courses...</div>
            </div>
        </div>

        <div id="my-courses" class="tab-content">
            <div id="myCoursesContainer"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <script>
        // FIXED CONFIG (Removed extra punctuation that was breaking the script)
        const firebaseConfig = {
            apiKey: "AIzaSyAnM53oo0Jah3Zg1Wxda-K6N5ddtYuJfQI",
            authDomain: "learnhub-4e07c.firebaseapp.com",
            databaseURL: "https://learnhub-4e07c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "learnhub-4e07c",
            storageBucket: "learnhub-4e07c.firebasestorage.app",
            messagingSenderId: "561780501823",
            appId: "1:561780501823:web:b064c375c17ca618ee378a",
            measurementId: "G-XSW93XZBZ8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
    </script>

    <script>
        // [ALL YOUR ORIGINAL COURSE DATA AND LOGIC RESTORED]
        const courses = [
            { id: 1, name: 'Web Development', description: 'Learn HTML, CSS, JavaScript', level: 'Beginner', lessons: 24, color: 'color1', url: 'course.html' },
            { id: 2, name: 'Java Basics', description: 'Master Java fundamentals', level: 'Beginner', lessons: 28, color: 'color2', url: 'java-course.html' },
            { id: 3, name: 'Python Masterclass', description: 'Learn Python for web', level: 'Intermediate', lessons: 32, color: 'color3', url: 'python-course.html' },
            { id: 4, name: 'C Programming', description: 'Understand low-level programming', level: 'Intermediate', lessons: 26, color: 'color4', url: 'c-course.html' },
            { id: 5, name: 'C++ Advanced', description: 'Master OOP with C++', level: 'Advanced', lessons: 30, color: 'color5', url: 'cpp-course.html' },
            { id: 6, name: 'JavaScript Pro', description: 'Advanced JS patterns', level: 'Advanced', lessons: 25, color: 'color6', url: 'javascript-course.html' },
            { id: 7, name: 'Data Structures', description: 'Essential DSA', level: 'Advanced', lessons: 29, color: 'color7', url: 'dsa-course.html' },
            { id: 8, name: 'React Framework', description: 'Build modern UIs', level: 'Intermediate', lessons: 27, color: 'color8', url: 'react-course.html' }
        ];

        let currentUser = null;

        function loadUserData() {
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'auth-firebase.html';
                    return;
                }
                currentUser = user;
                document.getElementById('userName').textContent = user.displayName || user.email;

                database.ref('users/' + user.uid).on('value', (snapshot) => {
                    const userData = snapshot.val() || {};
                    renderAllCourses(userData.enrolledCourses || []);
                    renderMyCourses(userData.enrolledCourses || []);
                });
            });
        }

        function renderAllCourses(enrolledCourses) {
            const container = document.getElementById('allCoursesGrid');
            container.innerHTML = courses.map(course => `
                <div class="course-card">
                    <div class="course-header ${course.color}">${course.name}</div>
                    <div class="course-body">
                        <p class="course-description">${course.description}</p>
                        <div class="course-meta"><span>📚 ${course.lessons} Lessons</span><span>📊 ${course.level}</span></div>
                        <button class="course-button ${enrolledCourses.includes(course.id) ? 'enrolled' : ''}" 
                                onclick="handleEnrollment(${course.id}, '${course.name}', '${course.url}')">
                            ${enrolledCourses.includes(course.id) ? '✓ Enrolled' : 'Enroll Now'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderMyCourses(enrolledCourseIds) {
    const container = document.getElementById('myCoursesContainer');
    const enrolledCourses = courses.filter(c => enrolledCourseIds.includes(c.id));

    if (enrolledCourses.length === 0) {
        container.innerHTML = `<div class="empty-message"><p>No courses yet!</p></div>`;
        return;
    }

    container.innerHTML = `<div class="enrolled-list">` + enrolledCourses.map(course => `
        <div class="enrolled-item">
            <h3>${course.name}</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill-${course.id}" style="width: 0%;"></div>
            </div>
            <p><span id="percent-text-${course.id}">0</span>% Complete</p>
            <button class="course-button" onclick="window.location.href='${course.url}'">Continue Learning</button>
        </div>
    `).join('') + `</div>`;

    // CRITICAL: Set up listeners for each enrolled course
    enrolledCourseIds.forEach(id => {
        database.ref('users/' + currentUser.uid + '/progress/' + id).on('value', (snapshot) => {
            const progressVal = snapshot.val() || 0;
            const fill = document.getElementById('progress-fill-' + id);
            const text = document.getElementById('percent-text-' + id);
            
            if (fill) fill.style.width = progressVal + '%';
            if (text) text.textContent = progressVal;
        });
    });
}

        function handleEnrollment(courseId, courseName, courseUrl) {
            const userRef = database.ref('users/' + currentUser.uid);
            userRef.once('value', snap => {
                const data = snap.val() || {};
                const list = data.enrolledCourses || [];
                if (!list.includes(courseId)) {
                    list.push(courseId);
                    userRef.update({ enrolledCourses: list });
                    database.ref('users/' + currentUser.uid + '/progress/' + courseId).set(0);
                    alert(`Enrolled in ${courseName}!`);
                } else {
                    window.location.href = courseUrl;
                }
            });
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.target.classList.add('active');
        }

        function logout() {
            if (confirm('Logout?')) auth.signOut().then(() => window.location.href = 'auth-firebase.html');
        }

        window.addEventListener('load', loadUserData);
    </script>
</body>
</html>
